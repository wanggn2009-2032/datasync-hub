version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: datasync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: datasync_hub
      MYSQL_USER: datasync
      MYSQL_PASSWORD: datasync123456
      TZ: 'Asia/Shanghai'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - datasync-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0-alpine
    container_name: datasync-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datasync-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datasync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/datasync_hub?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: datasync
      SPRING_DATASOURCE_PASSWORD: datasync123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - datasync-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datasync-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - datasync-network

volumes:
  mysql_data:
  redis_data:

networks:
  datasync-network:
    driver: bridge
